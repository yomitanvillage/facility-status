<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>草木資源化施設 稼働状況</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ============================================================
    // ★ ここにご自身のFirebase設定を貼り付けてください
    // ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyDNdtr1D4GhzQ7aWoBlAFYkTGLioPlk4io",
  authDomain: "yomitan-facility-status.firebaseapp.com",
  databaseURL: "https://yomitan-facility-status-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yomitan-facility-status",
  storageBucket: "yomitan-facility-status.firebasestorage.app",
  messagingSenderId: "518782906626",
  appId: "1:518782906626:web:66afeb51b72cf4c997121b"
};
    // ============================================================

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    onValue(ref(db, "facility/status"), (snapshot) => {
      const data = snapshot.val() || { status: "open" };
      render(data);
    });

    function render(data) {
      const isOpen = data.status === "open";

      document.getElementById("status-card").className = "status-card " + (isOpen ? "open" : "closed");
      document.getElementById("status-icon").textContent = isOpen ? "🌿" : "🚫";
      document.getElementById("status-text").textContent = isOpen ? "稼働中" : "停止中";

      const reasonCard = document.getElementById("reason-card");
      const reopenCard = document.getElementById("reopen-card");

      if (!isOpen && data.reason) {
        reasonCard.style.display = "block";
        document.getElementById("reason-val").textContent = data.reason;
      } else {
        reasonCard.style.display = "none";
      }

      if (!isOpen && data.reopen) {
        reopenCard.style.display = "block";
        const dt = new Date(data.reopen);
        document.getElementById("reopen-val").textContent =
          dt.toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric", weekday: "short" })
          + " " + dt.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }) + " 頃";
      } else {
        reopenCard.style.display = "none";
      }

      if (data.updatedAt) {
        const upd = new Date(data.updatedAt);
        document.getElementById("updated-note").textContent =
          "最終更新: " + upd.toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Hiragino Sans", "Meiryo", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #2d6a4f;
      color: #fff;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .app { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

    .status-card {
      border-radius: 16px;
      padding: 48px 20px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid transparent;
      transition: background 0.4s, border-color 0.4s;
    }
    .status-card.open   { background: #d8f3dc; border-color: #74c69d; }
    .status-card.closed { background: #ffe0e0; border-color: #f4a0a0; }

    .status-icon { font-size: 64px; display: block; margin-bottom: 16px; }
    .status-text { font-size: 36px; font-weight: 700; }
    .status-card.open   .status-text { color: #1b4332; }
    .status-card.closed .status-text { color: #7f1d1d; }

    .info-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 12px;
    }
    .info-label { font-size: 11px; color: #888; margin-bottom: 6px; letter-spacing: 0.05em; }
    .info-value { font-size: 15px; line-height: 1.7; }

    .updated-note {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 8px;
    }

    .realtime-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: #888;
      margin-top: 20px;
    }
    .dot {
      width: 8px; height: 8px;
      background: #52b788;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

<header>🌿 草木資源化施設 稼働状況</header>

<div class="app">
  <div id="status-card" class="status-card open">
    <span class="status-icon" id="status-icon">🌿</span>
    <div class="status-text"  id="status-text">読み込み中...</div>
  </div>

  <div id="reason-card" class="info-card" style="display:none;">
    <div class="info-label">停止理由</div>
    <div class="info-value" id="reason-val"></div>
  </div>

  <div id="reopen-card" class="info-card" style="display:none;">
    <div class="info-label">再開予定</div>
    <div class="info-value" id="reopen-val"></div>
  </div>

  <div class="updated-note" id="updated-note"></div>

  <div class="realtime-note">
    <span class="dot"></span>
    リアルタイムで自動更新されます
  </div>
</div>

</body>
</html>
